version: '3.8'

services:
  mongodb:
    container_name: mongodb_buscalibre_scrapper
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongoexpress:
    container_name: mongoexpress-buscalibre_scrapper
    image: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "False"
      ME_CONFIG_BASICAUTH_USERNAME: username
      ME_CONFIG_BASICAUTH_PASSWORD: password
    ports:
      - "8084:8081"
    depends_on:
      - mongodb

  api:
    container_name: api_buscalibre_scraper
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb
      - MONGO_PORT=27017

  scraper:
    container_name: buscalibre_scraper
    build: .
    # Aquí ejecutas tu script de Selenium
    command: python book_price_scraper.py
    depends_on:
      - mongodb
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb
      - MONGO_PORT=27017

volumes:
  mongo_data: